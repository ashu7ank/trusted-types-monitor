<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Trusted Types Advanced Test Lab</title>

  <!-- Toggle CSP modes here -->
  <!-- ENFORCE MODE -->
  <meta http-equiv="Content-Security-Policy"
        content="require-trusted-types-for 'script'; trusted-types default unsafePolicy safePolicy;">

  <!-- REPORT ONLY MODE (uncomment to test) -->
  <!--
  <meta http-equiv="Content-Security-Policy"
        content="require-trusted-types-for 'script'; report-uri /report;">
  -->

  <style>
    body { font-family: Arial; max-width: 1000px; margin: auto; padding: 20px; }
    button { padding: 10px; margin: 5px; cursor: pointer; }
    .danger { background: #e74c3c; color: white; }
    .safe { background: #2ecc71; color: white; }
    .run { background: #3498db; color: white; }
    pre { background: #111; color: #0f0; padding: 10px; height: 300px; overflow-y: auto; }
    .section { margin-top: 20px; }
  </style>
</head>

<body>

<h1>🔥 Trusted Types Advanced Test Lab</h1>

<div class="section">
  <button class="run" onclick="runAllTests()">Run All Tests</button>
  <button onclick="clearLogs()">Clear Logs</button>
  <button onclick="exportLogs()">Export JSON</button>
</div>

<div class="section">
  <h3>Manual Tests</h3>
  <button class="danger" onclick="testInnerHTML()">innerHTML</button>
  <button class="danger" onclick="testOuterHTML()">outerHTML</button>
  <button class="danger" onclick="testInsertAdjacentHTML()">insertAdjacentHTML</button>
  <button class="danger" onclick="testEval()">eval()</button>
  <button class="danger" onclick="testSetTimeout()">setTimeout(string)</button>
  <button class="danger" onclick="testFunction()">new Function()</button>
  <button class="danger" onclick="testScriptSrc()">script.src=javascript:</button>
  <button class="danger" onclick="testSrcdoc()">iframe.srcdoc</button>
  <button class="safe" onclick="testSafePolicy()">Safe Policy</button>
  <button class="danger" onclick="testUnsafePolicy()">Unsafe Policy</button>
</div>

<div class="section">
  <h3>Results</h3>
  <pre id="log"></pre>
</div>

<div id="output"></div>

<script>
/* ------------------ LOGGING ------------------ */

let logs = [];

function log(msg, type="INFO") {
  const time = new Date().toISOString();
  const entry = { time, type, msg };
  logs.push(entry);
  document.getElementById('log').textContent += `[${time}] [${type}] ${msg}\n`;
}

function clearLogs() {
  logs = [];
  document.getElementById('log').textContent = "";
}

function exportLogs() {
  const blob = new Blob([JSON.stringify(logs, null, 2)], {type: "application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = "tt-results.json";
  a.click();
}

/* ------------------ PAYLOADS ------------------ */

const payloads = [
  "<img src=x onerror=alert(1)>",
  "<svg/onload=alert(1)>",
  "<iframe srcdoc='<script>alert(1)<\/script>'>",
  "javascript:alert(1)"
];

function getPayload() {
  return payloads[Math.floor(Math.random() * payloads.length)];
}

/* ------------------ POLICIES ------------------ */

let safePolicy, unsafePolicy;

try {
  safePolicy = trustedTypes.createPolicy('safePolicy', {
    createHTML: (input) => input.replace(/onerror|onload|javascript:/gi, '')
  });

  unsafePolicy = trustedTypes.createPolicy('unsafePolicy', {
    createHTML: (input) => {
      log("Unsafe policy used with: " + input, "WARN");
      return input;
    }
  });
} catch (e) {
  log("Policy creation failed: " + e.message, "ERROR");
}

/* ------------------ TESTS ------------------ */

function testInnerHTML() {
  try {
    document.getElementById("output").innerHTML = getPayload();
    log("innerHTML executed");
  } catch (e) {
    log(e.message, "BLOCKED");
  }
}

function testOuterHTML() {
  try {
    document.getElementById("output").outerHTML = getPayload();
    log("outerHTML executed");
  } catch (e) {
    log(e.message, "BLOCKED");
  }
}

function testInsertAdjacentHTML() {
  try {
    document.body.insertAdjacentHTML("beforeend", getPayload());
    log("insertAdjacentHTML executed");
  } catch (e) {
    log(e.message, "BLOCKED");
  }
}

function testEval() {
  try {
    eval("alert(1)");
    log("eval executed");
  } catch (e) {
    log(e.message, "BLOCKED");
  }
}

function testSetTimeout() {
  try {
    setTimeout("alert(1)", 0);
    log("setTimeout executed");
  } catch (e) {
    log(e.message, "BLOCKED");
  }
}

function testFunction() {
  try {
    new Function("alert(1)")();
    log("Function() executed");
  } catch (e) {
    log(e.message, "BLOCKED");
  }
}

function testScriptSrc() {
  try {
    const s = document.createElement("script");
    s.src = "javascript:alert(1)";
    document.body.appendChild(s);
    log("script.src executed");
  } catch (e) {
    log(e.message, "BLOCKED");
  }
}

function testSrcdoc() {
  try {
    const iframe = document.createElement("iframe");
    iframe.srcdoc = "<script>alert(1)<\/script>";
    document.body.appendChild(iframe);
    log("iframe.srcdoc executed");
  } catch (e) {
    log(e.message, "BLOCKED");
  }
}

function testSafePolicy() {
  try {
    document.getElementById("output").innerHTML =
      safePolicy.createHTML(getPayload());
    log("Safe policy applied", "SAFE");
  } catch (e) {
    log(e.message, "BLOCKED");
  }
}

function testUnsafePolicy() {
  try {
    document.getElementById("output").innerHTML =
      unsafePolicy.createHTML(getPayload());
    log("Unsafe policy applied", "WARN");
  } catch (e) {
    log(e.message, "BLOCKED");
  }
}

/* ------------------ TEST RUNNER ------------------ */

const tests = [
  testInnerHTML,
  testOuterHTML,
  testInsertAdjacentHTML,
  testEval,
  testSetTimeout,
  testFunction,
  testScriptSrc,
  testSrcdoc,
  testUnsafePolicy,
  testSafePolicy
];

function runAllTests() {
  log("Running all tests...");
  tests.forEach(fn => {
    try { fn(); } catch (e) { log(e.message, "ERROR"); }
  });
}

/* ------------------ CSP VIOLATION HOOK ------------------ */

window.addEventListener('securitypolicyviolation', (e) => {
  log(`CSP VIOLATION: ${e.violatedDirective} | ${e.blockedURI}`, "CSP");
});

/* ------------------ EXTENSION HOOK ------------------ */

window.__tt_test_hook__ = (data) => {
  log("Extension: " + JSON.stringify(data), "EXT");
};

/* ------------------ INIT ------------------ */

window.onload = () => {
  log("Test lab ready");
};
</script>

</body>
</html>
