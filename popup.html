<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>TT Monitor</title>
  <link rel="stylesheet" href="css/popup.css">
</head>
<body>
  <div class="popup">
    <header>
      <h1>&#x1f6e1; TT Monitor</h1>
      <label class="toggle" title="Enable/disable monitoring">
        <input type="checkbox" id="toggle-enabled" checked>
        <span class="slider"></span>
      </label>
    </header>

    <div class="stats">
      <div class="stat-card">
        <span class="stat-val" id="p-total">0</span>
        <span class="stat-label">Violations</span>
      </div>
      <div class="stat-card warn">
        <span class="stat-val" id="p-critical">0</span>
        <span class="stat-label">Critical</span>
      </div>
      <div class="stat-card">
        <span class="stat-val" id="p-clusters">0</span>
        <span class="stat-label">Clusters</span>
      </div>
    </div>

    <div class="type-breakdown" id="type-breakdown"></div>

    <div class="recent" id="recent-list">
      <div class="empty">No violations on this tab yet.</div>
    </div>

    <div class="devtools-cta">
      <p>Open <strong>DevTools &rarr; TT Monitor</strong> tab for the full experience: live stream, fix guidance, policy generator, and AI assistant.</p>
    </div>

    <div class="actions">
      <button id="btn-export">Export CSV</button>
      <button id="btn-clear" class="danger">Clear Tab</button>
    </div>
  </div>
  <script src="js/tt-policy.js"></script>
  <script src="js/popup.js"></script>
</body>
</html>
